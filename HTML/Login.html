<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../Images/favicon.png"  type="icon/png">
  <title>EduTribe || Login Page</title>
  <link rel="stylesheet" href="../CSS/Login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Baskervville:ital,wght@0,400..700;1,400..700&family=Castoro:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&family=Ovo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
  <div class="container">
    <!-- Right Section (Hero Image at Top on Mobile) -->
    <div class="right-section">
      <img 
        class="hero-img" 
        src="../Images/login image.png.png" 
        alt="Login visual"
        loading="lazy"
      >
    </div>

    <!-- Left Section (Form below on mobile) -->
    <div class="left-section">
      <h3>Welcome Back</h3>
      <p class="subtitle">Welcome Back! Please Enter Your Details.</p>

      <form>
        <div class="form-group">
          <label>Email:</label>
          <input type="email" placeholder="Enter Your Email" required>
        </div>

        <div class="form-group">
          <label>Password:</label>
          <input type="password" placeholder="Enter Your Password" required>
        </div>

        <div class="form-options">
          <label><input type="checkbox"> Remember Me</label>
          <a href="https://myaccount.google.com/?pli=1">Forgot password</a>
        </div>

        <a href="../HTML/main.html"> <button type="button" class="btn btn-custom">Sign in <i class="bi bi-arrow-right"></i></button> </a>

        <button type="button" class="btn google-btn">
          <i class="bi bi-google"></i> Sign in with Google
        </button>

         <button type="button" class="btn google-btn">
          <i class="bi bi-apple"></i> Sign in with Apple
        </button>


      </form>

      <p class="signup-text">
        Don't have an account? <a href="../HTML/createaccount.html">Sign up for free</a>
      </p>
    </div>
  </div>
  <!-- <script src="../JAVASCRIPT/createaccount.js"></script> -->
</body>
</html>
