<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Images/favicon.png" type="icon/png">
    <title>EduTribe || Create Account</title>
    <link href="../Bootstrap_css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Baskervville:ital,wght@0,400..700;1,400..700&family=Castoro:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&family=Ovo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/createaccount.css">
</head>
<body>
    <!--  -->
    
    <div class="signup-container">    
        <div class="signup-left">
            <div class="signup-left-content">
                <!-- <h2>Create your Account</h2>
                <p>To Get Started With <b>EduTribe</b></p> -->
            </div>
        </div>

        <div class="signup-right">
            <h3 class="text-center mb-4">Sign Up</h3>
            <form id="signupForm" novalidate>
                <div class="form-group">
                    <input type="text" class="form-control" id="firstName" placeholder="First Name" required>
                    <div class="invalid-feedback">Please enter your first name</div>
                </div>
                
                <div class="form-group">
                    <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                    <div class="invalid-feedback">Please enter your last name</div>
                </div>
                
                <div class="form-group">
                    <input type="email" class="form-control" id="email" placeholder="Email Address" required>
                    <div class="invalid-feedback">Please enter a valid email address</div>
                </div>
                
                <div class="form-group password-container">
                    <input type="password" class="form-control" id="password" placeholder="Password" required minlength="8">
                    <span class="password-toggle" id="passwordToggle">
                        <i class="bi bi-eye"></i>
                    </span>
                    <div class="invalid-feedback">Password must be at least 8 characters long</div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label form-text" for="terms">
                        Accept Terms & Conditions
                    </label>
                    <div class="invalid-feedback">You must accept the terms and conditions</div>
                </div>

               <a href="../HTML/main.html"> <button type="submit" class="btn btn-main mb-3">Get Started <i class="bi bi-arrow-right"></i></button> </a>

                <a href="https://myaccount.google.com/?pli=1">
                    <button type="button" class="btn btn-google mb-3">
                        <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="Google" class="me-2">
                        Sign up with Google
                    </button>
                </a>

                <a href="https://account.apple.com/sign-in">
                    <button type="button" class="btn btn-apple">
                        <i class="bi bi-apple me-2"></i> Sign up with Apple
                    </button>
                </a>
            </form>

            <p class="login mt-4">Already have An Account? <a href="../HTML/Login.html">Login</a></p>
        </div>
    </div>

    <script src="../JAVASCRIPT/createaccount.js"></script>
</body>
</html>
